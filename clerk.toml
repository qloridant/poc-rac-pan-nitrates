# Clerk configuration — Arrêté PAN Nitrates 2023
# https://catala-lang.org
#
# Commandes :
#   clerk build       → compile les sources
#   clerk test        → exécute les tests
#   clerk runtest     → interprète et met à jour les résultats attendus

[build]
  catala_opts = ["--language=en"]

[module ArretePAN_Nitrates_2023]
  module_def = "src/arrete_pan_nitrates_2023.catala_en"

[test Tests_PAN_Nitrates_2023]
  catala_opts = ["--language=en"]
  dependencies = [ArretePAN_Nitrates_2023]
  tests = ["tests/arrete_pan_nitrates_2023_tests.catala_en"]
